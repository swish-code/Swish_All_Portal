<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Control Center — Swish Network Infrastructure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-0: #04060d;
    --bg-1: #070a16;
    --bg-card: rgba(10, 14, 28, 0.55);
    --grid: rgba(80, 110, 180, 0.07);
    --text: #e8edf7;
    --muted: #6b7693;
    --muted-2: #8a93ab;
    --cyan: #38e1ff;
    --border: rgba(120, 140, 190, 0.12);
  }

  html, body {
    background: var(--bg-0);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    background:
      radial-gradient(1200px 600px at 20% 30%, rgba(20, 30, 80, 0.35), transparent 60%),
      radial-gradient(900px 500px at 85% 80%, rgba(30, 10, 60, 0.30), transparent 60%),
      linear-gradient(180deg, #04060d 0%, #060914 100%);
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse at center, black 60%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .stage {
    position: relative;
    z-index: 1;
    padding: 48px 56px 64px;
  }

  /* Header */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 48px;
    gap: 24px;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    letter-spacing: 0.32em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .brand .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 12px var(--cyan);
  }

  h1.title {
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  h1.title .muted { color: #3a4258; font-weight: 500; }

  .top-right {
    display: flex;
    align-items: center;
    gap: 22px;
    padding-top: 14px;
  }
  .node { text-align: right; }
  .node .label {
    font-size: 11px; letter-spacing: 0.28em;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 6px;
  }
  .node .time {
    font-size: 26px; font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: #d9e1f2;
  }
  .auth {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 22px;
    border-radius: 999px;
    background: rgba(15, 22, 40, 0.7);
    border: 1px solid var(--border);
  }
  .auth .shield {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(56, 225, 255, 0.10);
    color: var(--cyan);
    display: grid; place-items: center;
  }
  .auth .meta .label {
    font-size: 10px; letter-spacing: 0.26em;
    color: var(--muted); text-transform: uppercase;
  }
  .auth .meta .level {
    font-size: 13px; letter-spacing: 0.22em;
    font-weight: 600; color: #e1e7f5;
    text-transform: uppercase;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 22px;
  }
  @media (max-width: 1400px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 1024px) { .grid { grid-template-columns: repeat(2, 1fr); } .stage { padding: 32px 24px; } h1.title { font-size: 44px; } }
  @media (max-width: 640px)  { .grid { grid-template-columns: 1fr; } }

  /* Cards */
  .card {
    position: relative;
    display: block;
    border-radius: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 26px 26px 24px;
    min-height: 320px;
    text-decoration: none;
    color: inherit;
    transition: transform .3s ease, box-shadow .3s ease, background .3s ease;
    cursor: pointer;
    isolation: isolate;
    overflow: hidden;
    /* Perf: limit repaint scope + skip offscreen rendering */
    contain: layout paint style;
    content-visibility: auto;
    contain-intrinsic-size: 320px;
  }
  /* Inside corner glow */
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: radial-gradient(380px 200px at 12% 10%, var(--accent-glow, transparent), transparent 60%);
    pointer-events: none;
    opacity: 0.55;
    transition: opacity .3s ease;
    z-index: 0;
  }
  /* Rotating border beam (uses a child .beam-frame > .beam) */
  .beam-frame {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
    padding: 2px;
    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
  }
  .beam {
    position: absolute;
    top: 50%; left: 50%;
    width: 260%;
    height: 260%;
    transform: translate3d(-50%, -50%, 0) rotate(0deg);
    background: conic-gradient(
      from 0deg,
      transparent 0%,
      transparent 58%,
      var(--accent) 72%,
      #ffffff 80%,
      var(--accent) 88%,
      transparent 100%
    );
    animation: spinBeam 4s linear infinite;
    animation-delay: var(--beam-delay, 0s);
    will-change: transform;
    /* No filter: blur/drop-shadow here — too expensive during scroll.
       The white-hot center of the gradient gives the glow look natively. */
  }
  @keyframes spinBeam {
    to { transform: translate3d(-50%, -50%, 0) rotate(360deg); }
  }

  .card:hover { transform: translateY(-4px); box-shadow: 0 30px 70px -28px var(--accent-shadow, transparent); }
  .card:hover::before { opacity: 1; }
  .card:hover .beam {
    animation-duration: 2s; /* speed up on hover */
  }

  /* Pause beam animations while the user is scrolling */
  .scrolling .beam { animation-play-state: paused; }

  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 38px;
    position: relative;
    z-index: 2;
  }
  .icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: grid; place-items: center;
    color: #fff;
    background: var(--accent-grad, linear-gradient(135deg, #555, #333));
    box-shadow: 0 12px 30px -10px var(--accent-shadow, rgba(0,0,0,0.4));
  }
  .status {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 10.5px; letter-spacing: 0.24em;
    text-transform: uppercase; font-weight: 500;
    padding: 6px 12px;
    border-radius: 999px;
    color: var(--accent);
    border: 1px solid var(--accent-border);
  }
  .status .pulse {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  .card h2 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 10px;
    position: relative; z-index: 2;
  }
  .card p.desc {
    color: var(--muted-2);
    font-size: 13px;
    line-height: 1.55;
    margin-bottom: 24px;
    position: relative; z-index: 2;
  }

  .bars {
    display: flex; gap: 5px;
    margin-bottom: 26px;
    position: relative; z-index: 2;
  }
  .bars span {
    flex: 1; height: 3px;
    border-radius: 2px;
    background: rgba(120, 140, 190, 0.12);
  }
  .bars span.on {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-shadow);
  }

  .card-foot {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    position: relative; z-index: 2;
  }
  .tag {
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .launch {
    font-size: 13px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--accent);
  }
  .arrow {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid var(--accent-border);
    color: var(--accent);
    display: grid; place-items: center;
    transition: transform .25s ease, background .25s ease;
  }
  .card:hover .arrow { transform: translateX(4px); background: var(--accent-glow); }

  /* Footer */
  .bottom {
    display: flex;
    justify-content: space-between;
    margin-top: 48px;
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    flex-wrap: wrap;
    gap: 12px;
  }
  .bottom .secure { display: inline-flex; align-items: center; gap: 8px; }
  .bottom .secure::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
  }

  /* ===== Transition portal ===== */
  .portal {
    position: fixed; inset: 0;
    z-index: 100;
    background: #000;
    display: grid; place-items: center;
    opacity: 0; visibility: hidden;
    transition: opacity .35s ease, visibility .35s ease;
    overflow: hidden;
  }
  .portal.show { opacity: 1; visibility: visible; }

  .portal .frame { position: absolute; inset: 0; pointer-events: none; }
  .portal .frame::before, .portal .frame::after {
    content: ""; position: absolute;
    background: var(--portal-accent, #2b6bff);
    box-shadow: 0 0 14px var(--portal-glow, rgba(43, 107, 255, 0.9));
    opacity: 0;
    animation: edgeGlow 1.6s ease forwards;
  }
  .portal.show .frame::before { animation-delay: .05s; }
  .portal.show .frame::after  { animation-delay: .15s; }
  .portal .frame::before { top: 56px; left: 56px; height: 2px; width: 38%; }
  .portal .frame::after { bottom: 56px; right: 56px; height: 2px; width: 38%; }
  @keyframes edgeGlow {
    0% { opacity: 0; transform: scaleX(0); transform-origin: left; }
    100% { opacity: 1; transform: scaleX(1); }
  }

  .portal .tag-tl, .portal .tag-bl {
    position: absolute;
    font-size: 12px;
    letter-spacing: 0.32em;
    color: #6b85c2;
    text-transform: uppercase;
  }
  .portal .tag-tl { top: 56px; right: 64px; }
  .portal .tag-bl { bottom: 56px; left: 64px; }

  .portal .core {
    position: relative;
    width: 460px; height: 460px;
    display: grid; place-items: center;
  }
  .portal .core::before {
    content: "";
    position: absolute;
    inset: 30% 30%;
    border-radius: 50%;
    background: radial-gradient(circle, #ffffff 0%, var(--portal-light, #6da8ff) 25%, var(--portal-accent, #2b6bff) 50%, transparent 75%);
    filter: blur(2px);
    transform: scale(0);
    animation: corePop 1.4s cubic-bezier(.2,.8,.2,1) forwards;
    box-shadow: 0 0 80px var(--portal-glow, rgba(43, 107, 255, 0.7)), 0 0 160px var(--portal-glow, rgba(43, 107, 255, 0.5));
  }
  @keyframes corePop {
    0%   { transform: scale(0); opacity: 0; }
    40%  { transform: scale(1.4); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  .portal .beams {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    animation: spin 18s linear infinite;
  }
  .portal .beams span {
    position: absolute;
    width: 4px; height: 240px;
    background: linear-gradient(to top, transparent, var(--portal-accent, #2b6bff) 50%, transparent);
    border-radius: 4px;
    opacity: 0;
    animation: beamOut 1.1s cubic-bezier(.2,.7,.2,1) forwards;
    box-shadow: 0 0 14px var(--portal-glow, rgba(43, 107, 255, 0.7));
  }
  @keyframes beamOut {
    0%   { transform: rotate(var(--rot)) translateY(0) scaleY(0); opacity: 0; }
    60%  { opacity: 1; }
    100% { transform: rotate(var(--rot)) translateY(-90px) scaleY(1); opacity: 0.9; }
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .portal .label { position: relative; z-index: 2; text-align: center; }
  .portal .label h2 {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: 0.04em;
    color: #fff;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(8px);
    animation: rise .7s ease .35s forwards;
    text-shadow: 0 0 30px var(--portal-glow, rgba(43, 107, 255, 0.6));
  }
  .portal .label .sub {
    margin-top: 18px;
    display: flex; gap: 28px;
    justify-content: center;
    font-size: 11px;
    letter-spacing: 0.32em;
    color: #6b85c2;
    text-transform: uppercase;
    opacity: 0;
    animation: rise .7s ease .6s forwards;
  }
  .portal .label .sub span::before {
    content: "● ";
    color: var(--portal-accent, #2b6bff);
    margin-right: 4px;
  }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  .portal .ring {
    position: absolute;
    border: 1px solid;
    border-color: color-mix(in srgb, var(--portal-accent, #2b6bff) 15%, transparent);
    border-radius: 50%;
    animation: ringPulse 2.2s ease-out infinite;
  }
  .portal .ring.r1 { width: 280px; height: 280px; }
  .portal .ring.r2 { width: 380px; height: 380px; animation-delay: .4s; }
  .portal .ring.r3 { width: 520px; height: 520px; animation-delay: .8s; }
  @keyframes ringPulse {
    0%   { transform: scale(0.6); opacity: 0; }
    50%  { opacity: 0.6; }
    100% { transform: scale(1.2); opacity: 0; }
  }
</style>
</head>
<body>
  <main class="stage">
    <header class="top">
      <div>
        <div class="brand">
          <span class="dot"></span>
          <span>Swish Network Infrastructure</span>
        </div>
        <h1 class="title">Control <span class="muted">Center</span></h1>
      </div>

      <div class="top-right">
        <div class="node">
          <div class="label">Network Node</div>
          <div class="time" id="clock">00:00:00</div>
        </div>
        <div class="auth">
          <div class="shield">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <div class="meta">
            <div class="label">Authorization</div>
            <div class="level">Clearance L4</div>
          </div>
        </div>
      </div>
    </header>

    <section class="grid" id="grid"></section>

    <footer class="bottom">
      <span>// SYS.CTRL.V2</span>
      <span class="secure">Secure Channel Established</span>
    </footer>
  </main>

  <div class="portal" id="portal" aria-hidden="true">
    <div class="frame"></div>
    <div class="tag-tl">Initialization Sequence // 0xAF42</div>
    <div class="tag-bl">Quantum Tunneling Protocol v4.22.0</div>

    <div class="core">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <div class="beams" id="beams"></div>
      <div class="label">
        <h2 id="portalTitle">System</h2>
        <div class="sub">
          <span>Temporal Lock OK</span>
          <span>Bridge Active</span>
        </div>
      </div>
    </div>
  </div>

      <symbol id="i-chef" viewBox="0 0 24 24"><path d="M6 13a4 4 0 1 1 2-7.5 4 4 0 0 1 8 0A4 4 0 1 1 18 13v6H6v-6z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><line x1="6" y1="19" x2="18" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
      <symbol id="i-bike" viewBox="0 0 24 24"><circle cx="6" cy="17" r="3.5" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="18" cy="17" r="3.5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M6 17l4-8h4l3 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><line x1="10" y1="9" x2="14" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="16" cy="6" r="1.5" fill="currentColor"/></symbol>
      <symbol id="i-chat" viewBox="0 0 24 24"><path d="M21 12a8 8 0 0 1-12 7l-5 2 1.5-4.5A8 8 0 1 1 21 12z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="8.5" cy="12" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="15.5" cy="12" r="1" fill="currentColor"/></symbol>
      <symbol id="i-cart" viewBox="0 0 24 24"><circle cx="9" cy="20" r="1.5" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="18" cy="20" r="1.5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M2 3h3l3 12h11l2-8H6" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
      <symbol id="i-utensils" viewBox="0 0 24 24"><path d="M5 3v8a2 2 0 0 0 2 2h0v8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="9" y1="3" x2="9" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M17 3c-2 1-3 3-3 5s1 3 3 3v10" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
      <symbol id="i-package" viewBox="0 0 24 24"><path d="M12 3l9 5v8l-9 5-9-5V8l9-5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><polyline points="3 8 12 13 21 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><line x1="12" y1="13" x2="12" y2="21" stroke="currentColor" stroke-width="2"/></symbol>
      <symbol id="i-menu" viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><line x1="8" y1="8" x2="16" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="16" x2="13" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    </defs>
  </svg>

  <script>
    /* Live clock */
    function tick() {
      const n = new Date();
      const pad = (x) => String(x).padStart(2, '0');
      document.getElementById('clock').textContent =
        pad(n.getHours()) + ':' + pad(n.getMinutes()) + ':' + pad(n.getSeconds());
    }
    tick();
    setInterval(tick, 1000);

    /* ===== Systems registry =====
       Each card defines its accent color and content. */
    const SYSTEMS = [
      {
        name: "Database", icon: "i-database", category: "Infrastructure", status: "Stable",
        desc: "Core data management and system infrastructure monitoring with real-time analytics.",
        accent: "#3a8dff", filled: 9, url: "https://swishwasla-production.up.railway.app"
      },
      {
        name: "Complaint System", icon: "i-alert", category: "Customer Success", status: "Active",
        desc: "User feedback management and technical resolution tracking platform.",
        accent: "#ff4566", filled: 10, url: "https://complaint-system-replit-production.up.railway.app/"
      },
      {
        name: "Schedule System", icon: "i-calendar", category: "Operations", status: "Syncing",
        desc: "Resource allocation and timeline management platform. Real-time coordination.",
        accent: "#15d9c0", filled: 8, url: "https://swish-schedule-3khv.vercel.app/"
      },
      {
        name: "Technical System", icon: "i-monitor", category: "Engineering", status: "Standby",
        desc: "Engineering documentation and backend service controls. High-performance tools.",
        accent: "#ff9a2e", filled: 10, url: "https://technicalsystemfinal-production.up.railway.app/"
      },
      {
        name: "Xontel", icon: "i-phone", category: "Communications", status: "Online",
        desc: "PBX call center dashboard — telephony, queues and call analytics control.",
        accent: "#4a8dff", filled: 11, url: "https://172.16.210.99/dashboard/general"
      },
      {
        name: "Ordable", icon: "i-bag", category: "Orders", status: "Active",
        desc: "Order management portal — Mishmash operations and live order tracking.",
        accent: "#e455c8", filled: 10, url: "https://www.ordermishmash.com/manage/login"
      },
      {
        name: "My Fatoorah", icon: "i-receipt", category: "Payments", status: "Secure",
        desc: "Payment gateway dashboard — transactions, invoices and reconciliation.",
        accent: "#19c98e", filled: 11, url: "https://eg.myfatoorah.com/En/All/Account/LogIn"
      },
      {
        name: "Verdi", icon: "i-wine", category: "Operations", status: "Ready",
        desc: "Verdi platform — restaurant operations and service tools.",
        accent: "#7ed957", filled: 9, url: "https://tryverdi.com/"
      },
      {
        name: "Tookan", icon: "i-truck", category: "Logistics", status: "Live",
        desc: "Last-mile delivery dispatch and fleet tracking dashboard.",
        accent: "#a259ff", filled: 10, url: "https://app.tookanapp.com/v2/#/page/login"
      },
      {
        name: "Talabat Portal", icon: "i-bowl", category: "Partners", status: "Active",
        desc: "Talabat partner dashboard — orders, menus and store analytics.",
        accent: "#ff6a3d", filled: 11, url: "https://partner-app.talabat.com/"
      },
      {
        name: "Grubtech", icon: "i-chef", category: "Kitchen Ops", status: "Active",
        desc: "Unified kitchen management and multi-aggregator orchestration.",
        accent: "#1ec4a8", filled: 9, url: "https://grubops.grubtech.io/#/login"
      },
      {
        name: "Deliveroo", icon: "i-bike", category: "Partners", status: "Live",
        desc: "Deliveroo partner hub — orders and store performance metrics.",
        accent: "#00cfd4", filled: 10, url: "https://partner-hub.deliveroo.com/orders?orgId=551372"
      },
      {
        name: "Respond", icon: "i-chat", category: "Support", status: "Online",
        desc: "Omnichannel customer messaging and conversation routing inbox.",
        accent: "#8466ff", filled: 11, url: "https://app.respond.io/space/191969/inbox/252910063"
      },
      {
        name: "Keeta", icon: "i-cart", category: "Partners", status: "Active",
        desc: "Keeta merchant dashboard — order flow and fulfilment management.",
        accent: "#ffb627", filled: 10, url: "https://merchant-eu.mykeeta.com/"
      },
      {
        name: "BillBayt", icon: "i-utensils", category: "Vendors", status: "Active",
        desc: "BillBayt vendor portal — catering, bulk orders and menus.",
        accent: "#2ec27e", filled: 9, url: "https://vendor.bilbayt.com/"
      },
      {
        name: "Do Delivery", icon: "i-package", category: "Logistics", status: "Live",
        desc: "Last-mile dispatch platform — orders, riders and tracking.",
        accent: "#38c5ff", filled: 10, url: "https://dodelivery.me/login"
      },
      {
        name: "Jahez", icon: "i-menu", category: "Partners", status: "Active",
        desc: "Jahez restaurant portal — menu, orders and performance reporting.",
        accent: "#ff3b5c", filled: 11, url: "https://portal.jahez.net/restaurant-login.htm?action=logout"
      }
    ];

    /* Color helpers */
    function withAlpha(hex, a) {
      const h = hex.replace('#','');
      const r = parseInt(h.slice(0,2),16);
      const g = parseInt(h.slice(2,4),16);
      const b = parseInt(h.slice(4,6),16);
      return `rgba(${r}, ${g}, ${b}, ${a})`;
    }
    function lighten(hex, amt) {
      const h = hex.replace('#','');
      const r = Math.min(255, parseInt(h.slice(0,2),16) + amt);
      const g = Math.min(255, parseInt(h.slice(2,4),16) + amt);
      const b = Math.min(255, parseInt(h.slice(4,6),16) + amt);
      return `rgb(${r}, ${g}, ${b})`;
    }

    /* Build cards */
    const grid = document.getElementById('grid');
    const TOTAL_BARS = 14;

    SYSTEMS.forEach((sys, idx) => {
      const a = sys.accent;
      const grad = `linear-gradient(135deg, ${lighten(a, 30)}, ${a})`;
      // Stagger beam rotation so cards aren't synced
      const beamDelay = -((idx * 0.27) % 4).toFixed(2) + 's';
      const styles = [
        `--accent:${a}`,
        `--accent-glow:${withAlpha(a, 0.18)}`,
        `--accent-border:${withAlpha(a, 0.45)}`,
        `--accent-shadow:${withAlpha(a, 0.45)}`,
        `--accent-grad:${grad}`,
        `--beam-delay:${beamDelay}`,
      ].join(';');

      const bars = Array.from({length: TOTAL_BARS}, (_, i) =>
        `<span class="${i < sys.filled ? 'on' : ''}"></span>`).join('');

      const card = document.createElement('a');
      card.className = 'card';
      card.setAttribute('href', sys.url);
      card.setAttribute('data-system', sys.name);
      card.setAttribute('data-accent', a);
      card.setAttribute('style', styles);

      card.innerHTML = `
        <div class="beam-frame"><div class="beam"></div></div>
        <div class="card-head">
          <div class="icon"><svg width="24" height="24"><use href="#${sys.icon}"/></svg></div>
          <span class="status"><span class="pulse"></span>${sys.status}</span>
        </div>
        <h2>${sys.name}</h2>
        <p class="desc">${sys.desc}</p>
        <div class="bars">${bars}</div>
        <div class="card-foot">
          <div>
            <div class="tag">${sys.category}</div>
            <div class="launch">Launch &rarr;</div>
          </div>
          <div class="arrow">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

    /* Build radiating beams (rebuilt per click for fresh animation) */
    const beams = document.getElementById('beams');
    const BEAM_COUNT = 14;
    function buildBeams() {
      beams.innerHTML = '';
      for (let i = 0; i < BEAM_COUNT; i++) {
        const s = document.createElement('span');
        const rot = (360 / BEAM_COUNT) * i + (Math.random() * 10 - 5);
        s.style.setProperty('--rot', rot + 'deg');
        s.style.animationDelay = (0.05 * i) + 's';
        s.style.height = (180 + Math.random() * 120) + 'px';
        beams.appendChild(s);
      }
    }
    buildBeams();

    /* Transition handler */
    const portal = document.getElementById('portal');
    const portalTitle = document.getElementById('portalTitle');

    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', (e) => {
        e.preventDefault();
        const url = card.getAttribute('href');
        const name = card.getAttribute('data-system') || 'Loading';
        const accent = card.getAttribute('data-accent') || '#2b6bff';

        portal.style.setProperty('--portal-accent', accent);
        portal.style.setProperty('--portal-light', lighten(accent, 50));
        portal.style.setProperty('--portal-glow', withAlpha(accent, 0.7));

        portalTitle.textContent = name;
        portal.classList.add('show');
        portal.setAttribute('aria-hidden', 'false');

        buildBeams();

        setTimeout(() => { window.location.href = url; }, 1500);
      });
    });

    /* Hide portal on bfcache restore */
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) {
        portal.classList.remove('show');
        portal.setAttribute('aria-hidden', 'true');
      }
    });

    /* Pause beam animations while the page is scrolling (smoother scroll on low-power devices) */
    let scrollTimer = null;
    const html = document.documentElement;
    window.addEventListener('scroll', () => {
      if (!html.classList.contains('scrolling')) {
        html.classList.add('scrolling');
      }
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => html.classList.remove('scrolling'), 180);
    }, { passive: true });
  </script>
</body>
</html>
